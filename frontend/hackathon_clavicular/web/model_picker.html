<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Model Picker</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #efefef;
        font-family: sans-serif;
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      #status {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 10px 12px;
        border-radius: 8px;
        max-width: 80%;
        white-space: pre-wrap;
        font-size: 13px;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="status">Booting viewer...</div>
    </div>

    <script>
      const statusEl = document.getElementById('status');
      const container = document.getElementById('app');

      function setStatus(message) {
        console.log(message);
        statusEl.textContent = message;
      }

      window.addEventListener('error', (event) => {
        setStatus(
          'Window error:\n' +
          (event.message || 'unknown error') +
          '\n\n' +
          (event.filename || '') +
          (event.lineno ? ':' + event.lineno : '')
        );
      });

      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        setStatus(
          'Unhandled rejection:\n' +
          (reason && reason.stack ? reason.stack : String(reason))
        );
      });

      setStatus('Plain script started');

      (async function main() {
        try {
          setStatus('Importing three.js modules...');

          const THREE = await import('./vendor/three.module.js');
          const { OrbitControls } = await import('./vendor/controls/OrbitControls.js');
          const { GLTFLoader } = await import('./vendor/loaders/GLTFLoader.js');
          const { DRACOLoader } = await import('./vendor/loaders/DRACOLoader.js');

          setStatus('Modules imported successfully');

          const params = new URLSearchParams(window.location.search);
          const modelUrl = params.get('model');

          setStatus(
            'Modules imported successfully\n\nModel URL:\n' +
            (modelUrl || '(missing)')
          );

          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0xefefef);

          const camera = new THREE.PerspectiveCamera(
            45,
            container.clientWidth / container.clientHeight,
            0.1,
            1000
          );
          camera.position.set(0, 1.5, 4);

          const renderer = new THREE.WebGLRenderer({ antialias: true });
          renderer.setSize(container.clientWidth, container.clientHeight);
          renderer.setPixelRatio(window.devicePixelRatio);
          container.appendChild(renderer.domElement);

          const controls = new OrbitControls(camera, renderer.domElement);
          controls.enableDamping = true;

          scene.add(new THREE.AmbientLight(0xffffff, 1.2));

          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(3, 5, 2);
          scene.add(dirLight);

          const raycaster = new THREE.Raycaster();
          const mouse = new THREE.Vector2();

          let selectedMesh = null;
          let pickableMeshes = [];

          function sendSelectedPart(name) {
            window.parent.postMessage(
              JSON.stringify({
                type: 'part-selected',
                name: name || '(unnamed part)',
              }),
              '*'
            );
          }

          function clearHighlight() {
            if (!selectedMesh) return;

            const material = selectedMesh.material;
            if (
              material &&
              !Array.isArray(material) &&
              material.emissive &&
              selectedMesh.userData.oldEmissive
            ) {
              material.emissive.copy(selectedMesh.userData.oldEmissive);
            }

            selectedMesh = null;
          }

          function applyHighlight(mesh) {
            clearHighlight();

            const material = mesh.material;
            if (material && !Array.isArray(material) && material.emissive) {
              mesh.userData.oldEmissive = material.emissive.clone();
              material.emissive.setHex(0xffaa00);
            }

            selectedMesh = mesh;
          }

          async function checkUrl(url) {
            try {
              const response = await fetch(url, { method: 'GET' });
              setStatus(
                'Fetch check:\n' +
                url +
                '\n\nHTTP ' +
                response.status +
                ' ' +
                response.statusText
              );
              return response.ok;
            } catch (e) {
              setStatus('Fetch failed:\n' + url + '\n\n' + e);
              return false;
            }
          }

          async function loadModel(url) {
            const ok = await checkUrl(url);
            if (!ok) return;

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('./vendor/libs/draco/');

            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            loader.load(
              url,
              function (gltf) {
                setStatus('GLB loaded successfully:\n' + url);

                const model = gltf.scene;
                scene.add(model);

                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());

                model.position.sub(center);

                camera.near = Math.max(size / 100, 0.01);
                camera.far = Math.max(size * 100, 1000);
                camera.updateProjectionMatrix();
                camera.position.set(size * 0.6, size * 0.4, size * 0.9);
                camera.lookAt(0, 0, 0);

                pickableMeshes = [];
                model.traverse(function (obj) {
                  if (obj.isMesh) {
                    pickableMeshes.push(obj);
                  }
                });
              },
              undefined,
              function (error) {
                setStatus(
                  'GLTFLoader failed:\n' +
                  url +
                  '\n\n' +
                  (error && error.message ? error.message : error)
                );
                console.error(error);
              }
            );
          }

          if (!modelUrl) {
            setStatus('No model URL was passed from Flutter.');
          } else {
            loadModel(modelUrl);
          }

          function onClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();

            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(pickableMeshes, true);

            if (hits.length === 0) {
              clearHighlight();
              sendSelectedPart('Nothing selected');
              return;
            }

            const hit = hits[0].object;
            applyHighlight(hit);

            const name =
              hit.name || (hit.parent && hit.parent.name) || '(unnamed part)';
            sendSelectedPart(name);
          }

          renderer.domElement.addEventListener('click', onClick);

          function onResize() {
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
          }

          window.addEventListener('resize', onResize);

          function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
          }

          animate();
        } catch (e) {
          setStatus(
            'Module/bootstrap failure:\n' +
            (e && e.stack ? e.stack : String(e))
          );
          console.error(e);
        }
      })();
    </script>
  </body>
</html>
