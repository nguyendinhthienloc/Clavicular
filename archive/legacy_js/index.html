<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BodyCheck AI Core Test</title>
    <script src="./config.js"></script>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 24px;
        max-width: 900px;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        margin-top: 8px;
      }

      button, select {
        margin-top: 12px;
        margin-right: 8px;
      }

      #loading {
        display: none;
        margin-top: 16px;
        color: #0b5cab;
      }

      #diagnosis-card {
        display: none;
        margin-top: 24px;
        padding: 16px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>BodyCheck AI Core</h1>

    <label for="symptom-input">Symptoms:</label>
    <textarea id="symptom-input" placeholder="Body region: Chest. Pain: pressure. Duration: 30 min. Severity: 9. Left arm pain."></textarea>
    <br />

    <label for="language">Language:</label>
    <select id="language">
      <option value="en">English</option>
      <option value="vi">Vietnamese</option>
    </select>
    <br />

    <button id="diagnose-btn">Diagnose</button>
    <button id="tts-btn" type="button">Read aloud</button>

    <div id="loading">Analyzing symptoms...</div>
    <section id="diagnosis-card"></section>

    <script type="module">
      import { callDiagnosis } from './api/openrouter.js';
      import { speakText, initTTSButton } from './api/elevenlabs.js';
      import { renderDiagnosisCard } from './components/diagnosis-card.js';

      let latestDiagnosis = null;
      let latestLanguage = 'en';

      window.runDiagnosis = async function(userMessage, language) {
        const loading = document.getElementById('loading');
        const card = document.getElementById('diagnosis-card');

        loading.style.display = 'block';
        card.style.display = 'none';

        const [diagnosis] = await Promise.all([
          callDiagnosis(userMessage, language),
          window.generateBodyImage?.(window.state?.selectedLabel)
        ]);

        loading.style.display = 'none';
        renderDiagnosisCard(diagnosis);

        latestDiagnosis = diagnosis;
        latestLanguage = language;

        const summary = `${diagnosis.conditions?.[0]?.name || ''}. ${diagnosis.action || ''}`.trim();
        if (summary) {
          speakText(summary, language);
        }

        const topCondition = diagnosis.conditions?.[0]?.name || '';
        window.loadMedicalSources?.(topCondition, language);
      };

      document.getElementById('diagnose-btn').addEventListener('click', async () => {
        const text = document.getElementById('symptom-input').value.trim();
        const language = document.getElementById('language').value;

        if (!text) {
          alert('Please enter symptoms first.');
          return;
        }

        await window.runDiagnosis(text, language);
      });

      initTTSButton(
        () => `${latestDiagnosis?.conditions?.[0]?.name || ''}. ${latestDiagnosis?.action || ''}`.trim(),
        () => latestLanguage
      );
    </script>
  </body>
</html>
